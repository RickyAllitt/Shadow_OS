<!-- Title Selection Modal -->
<div id="titleModal" class="modal">
    <div class="modal-content system-panel">
        <span class="close" onclick="document.getElementById('titleModal').style.display='none'">&times;</span>
        <h2>Select Title</h2>
        <p class="system-text-muted">Equip a title to display on your profile.</p>

        <div class="title-list">
            {% for pt in player.unlocked_titles %}
            <form action="{{ url_for('main.equip_title_route', title_id=pt.title.id) }}" method="POST"
                style="margin-bottom: 10px;">
                <button type="submit" class="quest-card rank-{{ 'S' if 'S-Rank' in pt.title.name else 'E' }}"
                    style="width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(0,0,0,0.6); border: 1px solid #444;">
                    <div>
                        <span style="font-weight: bold; color: var(--color-primary);">{{ pt.title.name }}</span>
                        <br>
                        <span style="font-size: 0.8em; color: #888;">{{ pt.title.description }}</span>
                    </div>
                    {% if pt.title.buff_description %}
                    <span
                        style="font-size: 0.7em; background: #333; padding: 2px 5px; border-radius: 4px; color: gold;">
                        {{ pt.title.buff_description }}
                    </span>
                    {% endif %}

                    {% if player.current_title_id == pt.title.id %}
                    <span style="color: lime; font-weight: bold;">[EQUIPPED]</span>
                    {% endif %}
                </button>
            </form>
            {% endfor %}
        </div>

        <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 10px;">
            <h4 style="font-size: 0.8em; color: #666;">Locked Titles (Preview)</h4>
            <!-- Optional: Preview locked titles? For now, keep mystery or implemented later -->
            <div style="font-size: 0.8em; color: #444; font-style: italic;">
                Keep leveling up and maintaining streaks to unlock more.
            </div>
        </div>
    </div>
</div>

<style>
    /* Reusing Modal Styles from existing CSS if available, else inline for robustness */
    .modal {
        display: none;
        position: fixed;
        z-index: 200;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(2px);
    }

    .modal-content {
        background-color: #111;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid var(--color-primary);
        width: 80%;
        max-width: 500px;
        box-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
    }

    .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
    }

    .close:hover,
    .close:focus {
        color: white;
        text-decoration: none;
        cursor: pointer;
    }
</style>
