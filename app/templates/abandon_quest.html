{% extends "layout.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: 80vh;">
    <div class="panel penalty-mode"
        style="width: 100%; max-width: 500px; padding: 40px; text-align: center; border-color: var(--color-danger); box-shadow: 0 0 20px rgba(255, 42, 42, 0.2);">
        <h2 style="margin-bottom: 20px; color: var(--color-danger);">WARNING: ABANDON QUEST</h2>

        <p style="margin-bottom: 30px; line-height: 1.6;">
            You are about to abandon the quest <strong style="color: white; font-size: 1.1em;">"{{ quest.title
                }}"</strong>.<br>
            <span style="color: #aaa; font-size: 0.9em;">Rank: {{ quest.rank }}</span>
        </p>

        <div
            style="background: rgba(255, 0, 0, 0.1); padding: 15px; border: 1px solid var(--color-danger); margin-bottom: 30px;">
            <p style="color: var(--color-danger); font-weight: bold; font-size: 1.2em; margin: 0;">PENALTY: -{{ penalty
                }} G</p>
            <p style="font-size: 0.8em; color: #888; margin-top: 5px;">Your Current Gold: {{ current_user.gold }} G</p>
        </div>

        <form action="/delete_quest/{{ quest.id }}" method="POST">
            <div style="display: flex; justify-content: space-between; gap: 20px;">
                <a href="/" class="btn-small"
                    style="text-decoration: none; padding: 12px 0; width: 100%; border-color: #555; color: #aaa;">CANCEL</a>
                <button type="submit" class="btn-complete"
                    style="width: 100%; padding: 12px 0; background: rgba(255, 0, 0, 0.2); border-color: var(--color-danger); color: var(--color-danger);">CONFIRM
                    ABANDON</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
