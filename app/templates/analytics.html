{% extends "layout.html" %}

{% block content %}
<div class="container" style="max-width: 1200px; margin: 0 auto; color: #fff;">
    <h2 class="section-title">SYSTEM LOGS // ANALYTICS</h2>

    <!-- GROWTH CHART (Expanded) -->
    <div
        style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 10px;">
        <h3 style="color: var(--color-gold); margin-bottom: 15px;">GROWTH PROTOCOL: TOTAL STATS (Last 30 Days)</h3>
        <div style="height: 500px;">
            <canvas id="growthChart"></canvas>
        </div>
        <p style="text-align: center; color: #888; margin-top: 10px; font-size: 0.9em;">
            Tracking aggregate Strength, Intelligence, Agility, Vitality, and Sense over time.
        </p>
    </div>

    <!-- ACTIVITY HEATMAP -->
    <div
        style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 10px;">
        <h3 style="color: #00bcd4; margin-bottom: 15px;">ACTIVITY LOG (Last 365 Days)</h3>
        <div id="heatmapGrid"
            style="display: grid; grid-template-rows: repeat(7, 12px); grid-auto-flow: column; gap: 3px; overflow-x: auto; padding-bottom: 5px;">
            <!-- Generated by JS -->
        </div>
        <div
            style="display: flex; justify-content: flex-end; align-items: center; gap: 5px; margin-top: 10px; font-size: 0.8em; color: #888;">
            <span>Less</span>
            <div style="width: 12px; height: 12px; background: #222; border-radius: 2px;"></div>
            <div style="width: 12px; height: 12px; background: #0e4429; border-radius: 2px;"></div>
            <div style="width: 12px; height: 12px; background: #006d32; border-radius: 2px;"></div>
            <div style="width: 12px; height: 12px; background: #26a641; border-radius: 2px;"></div>
            <div style="width: 12px; height: 12px; background: #39d353; border-radius: 2px;"></div>
            <span>More</span>
        </div>
    </div>

    <div style="margin-top: 30px; text-align: center;">
        <a href="{{ url_for('main.dashboard') }}" class="btn-complete"
            style="text-decoration: none; padding: 10px 40px; display: inline-block;">RETURN TO DASHBOARD</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Growth Chart
    const ctxGrowth = document.getElementById('growthChart').getContext('2d');

    // Create gradient
    const gradient = ctxGrowth.createLinearGradient(0, 0, 0, 500);
    gradient.addColorStop(0, 'rgba(255, 235, 59, 0.4)');
    gradient.addColorStop(1, 'rgba(255, 235, 59, 0)');

    new Chart(ctxGrowth, {
        type: 'line',
        data: {
            labels: {{ dates | tojson }},
        datasets: [{
            label: 'Effective Power (Total Stats)',
            data: {{ growth_data | tojson }},
        borderColor: '#ffeb3b',
        backgroundColor: gradient,
        fill: true,
        tension: 0.3,
        pointBackgroundColor: '#fff',
        pointBorderColor: '#ffeb3b',
        pointRadius: 4,
        pointHoverRadius: 6
            }]
        },
        options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
            mode: 'index',
            intersect: false,
        },
        scales: {
            y: {
                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                ticks: { color: '#aaa' },
                beginAtZero: false
            },
            x: {
                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                ticks: { color: '#aaa' }
            }
        },
        plugins: {
            legend: {
                labels: { color: '#fff', font: { size: 14 } }
            },
            tooltip: {
                backgroundColor: 'rgba(0,0,0,0.8)',
                titleColor: '#ffeb3b',
                bodyColor: '#fff',
                borderColor: '#333',
                borderWidth: 1
            }
        }
    }
    });

    // Heatmap Generator
    const activityMap = {{ activity_map | default ({}) | tojson }};
    const heatmapContainer = document.getElementById('heatmapGrid');

    // Generate dates for last 365 days
    const today = new Date();
    const startDate = new Date();
    startDate.setDate(today.getDate() - 364);
    const startDay = startDate.getDay(); // 0=Sun, 1=Mon...

    // Add empty divs for offset
    for (let j = 0; j < startDay; j++) {
        const empty = document.createElement('div');
        empty.style.width = '12px';
        empty.style.height = '12px';
        heatmapContainer.appendChild(empty);
    }

    for (let i = 364; i >= 0; i--) {
        const d = new Date();
        d.setDate(today.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];

        const count = activityMap[dateStr] || 0;

        let color = '#222'; // Level 0
        if (count > 0) color = '#0e4429';
        if (count > 2) color = '#006d32';
        if (count > 4) color = '#26a641';
        if (count >= 7) color = '#39d353'; // Max

        const el = document.createElement('div');
        el.style.width = '12px';
        el.style.height = '12px';
        el.style.backgroundColor = color;
        el.style.borderRadius = '2px';
        el.title = `${dateStr}: ${count} quests`;
        heatmapContainer.appendChild(el);
    }

</script>
{% endblock %}
