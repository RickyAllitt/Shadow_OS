{% extends "layout.html" %}

{% block content %}
<div class="container" style="max-width: 1200px; margin: 0 auto; color: #fff;">
    <h2 class="section-title">SYSTEM LOGS // ANALYTICS</h2>

    <!-- GROWTH CHART (Expanded) -->
    <div
        style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 10px;">
        <h3 style="color: var(--color-gold); margin-bottom: 15px;">GROWTH PROTOCOL: TOTAL STATS (Last 30 Days)</h3>
        <div style="height: 500px;">
            <canvas id="growthChart"></canvas>
        </div>
        <p style="text-align: center; color: #888; margin-top: 10px; font-size: 0.9em;">
            Tracking aggregate Strength, Intelligence, Agility, Vitality, and Sense over time.
        </p>
    </div>

    <div style="margin-top: 30px; text-align: center;">
        <a href="{{ url_for('main.dashboard') }}" class="btn-complete"
            style="text-decoration: none; padding: 10px 40px; display: inline-block;">RETURN TO DASHBOARD</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Growth Chart
    const ctxGrowth = document.getElementById('growthChart').getContext('2d');

    // Create gradient
    const gradient = ctxGrowth.createLinearGradient(0, 0, 0, 500);
    gradient.addColorStop(0, 'rgba(255, 235, 59, 0.4)');
    gradient.addColorStop(1, 'rgba(255, 235, 59, 0)');

    new Chart(ctxGrowth, {
        type: 'line',
        data: {
            labels: {{ dates | tojson }},
        datasets: [{
            label: 'Effective Power (Total Stats)',
            data: {{ growth_data | tojson }},
        borderColor: '#ffeb3b',
        backgroundColor: gradient,
        fill: true,
        tension: 0.3,
        pointBackgroundColor: '#fff',
        pointBorderColor: '#ffeb3b',
        pointRadius: 4,
        pointHoverRadius: 6
            }]
        },
        options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
            mode: 'index',
            intersect: false,
        },
        scales: {
            y: {
                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                ticks: { color: '#aaa' },
                beginAtZero: false
            },
            x: {
                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                ticks: { color: '#aaa' }
            }
        },
        plugins: {
            legend: {
                labels: { color: '#fff', font: { size: 14 } }
            },
            tooltip: {
                backgroundColor: 'rgba(0,0,0,0.8)',
                titleColor: '#ffeb3b',
                bodyColor: '#fff',
                borderColor: '#333',
                borderWidth: 1
            }
        }
    }
    });
</script>
{% endblock %}
