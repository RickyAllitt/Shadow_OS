{% extends "layout.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="panel" style="max-width: 500px; text-align: center; border-color: var(--color-primary);">

        <h2
            style="color: var(--color-primary); margin-bottom: 30px; font-size: 1.5em; text-transform: uppercase; letter-spacing: 2px;">
            VERIFY COMPLETION
        </h2>

        <div style="margin-bottom: 40px;">
            <p style="color: #888; margin-bottom: 10px; font-size: 0.9em;">OBJECTIVE</p>
            <h1 style="font-size: 2em; margin: 0; color: white;">{{ quest.title }}</h1>
        </div>

        <div style="margin-bottom: 50px; padding: 20px; border: 1px solid #333; background: rgba(0,0,0,0.3);">
            <p style="color: #aaa; line-height: 1.6; font-style: italic;">
                "I hereby swear on my honor as a Player that this task is fully complete.
                I understand that false validation weakens my resolve and corrupts the System."
            </p>
        </div>

        <form action="{{ url_for('main.complete_quest', id=quest.id) }}" method="POST">
            <button type="submit" class="btn-complete"
                style="width: 100%; padding: 20px; font-size: 1.2em; margin-bottom: 15px;">
                I SWEAR
            </button>
        </form>

        <a href="{{ url_for('main.dashboard') }}" style="color: #666; text-decoration: none; font-size: 0.9em;">
            CANCEL
        </a>

    </div>
</div>
{% endblock %}
