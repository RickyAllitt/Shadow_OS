{% extends "layout.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; height: 80vh;">
    <div class="panel" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <h2 style="margin-bottom: 30px;">HUNTER REGISTRATION</h2>

        <form action="/register" method="POST">
            <div style="margin-bottom: 20px;">
                <input type="text" name="username" placeholder="Hunter Name" required
                    style="width: 100%; padding: 12px; background: black; border: 1px solid var(--color-primary); color: white; border-radius: 4px;">
            </div>

            <div style="margin-bottom: 20px;">
                <input type="password" name="password" placeholder="Password" required
                    style="width: 100%; padding: 12px; background: black; border: 1px solid var(--color-primary); color: white; border-radius: 4px;">
            </div>

            <div style="margin-bottom: 30px;">
                <input type="password" name="confirm" placeholder="Confirm Password" required
                    style="width: 100%; padding: 12px; background: black; border: 1px solid var(--color-primary); color: white; border-radius: 4px;">
            </div>

            <button type="submit" class="btn-complete"
                style="width: 100%; padding: 12px; font-weight: bold; font-size: 1.1em; margin-bottom: 20px;">INITIATE</button>
        </form>

        <p style="color: #666; font-size: 0.9em;">
            Already Registered? <a href="/login" style="color: var(--color-primary);">Login Here</a>
        </p>
    </div>
</div>
{% endblock %}
