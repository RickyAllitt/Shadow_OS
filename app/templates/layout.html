<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM INTERFACE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="{% if current_user.is_authenticated and current_user.has_debuff %}glitch-theme{% endif %}">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
        {% for category, message in messages %}
        <div class="flash-msg {{ category }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% if current_user.is_authenticated %}
    <a href="{{ url_for('auth.logout') }}"
        style="position: fixed; top: 20px; right: 20px; color: var(--color-danger); text-decoration: none; border: 1px solid var(--color-danger); padding: 5px 10px; z-index: 100;">
        LOGOUT
    </a>
    {% endif %}

    <div
        class="system-container {% if current_user.is_authenticated and current_user.in_penalty_zone %}penalty-mode{% endif %}">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
